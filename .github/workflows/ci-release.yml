name: CI and Release

on:
  push:
    branches:
      - 1.1.1
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # package-tests:
  #   name: Package Tests
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v5

  #     - name: Setup pnpm
  #       uses: pnpm/action-setup@v4
  #       with:
  #         version: 10.15.0

  #     - name: Setup Node
  #       uses: actions/setup-node@v6
  #       with:
  #         node-version: 22
  #         cache: pnpm

  #     - name: Install dependencies
  #       run: pnpm install --frozen-lockfile

  #     - name: Build packages
  #       run: pnpm build:package

  #     - name: Run package tests
  #       run: pnpm test

  release:
    name: Release
    runs-on: ubuntu-latest
    # needs: package-tests
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      # Configure Actions variable RELEASE_APP_CLIENT_ID and secret RELEASE_APP_PRIVATE_KEY
      # (GitHub App client ID + private key PEM). Install the app on this repo; allow it to
      # bypass branch protection if pushes to main are restricted.
      - name: Create release GitHub App token
        id: release-app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Get GitHub App bot user ID
        id: release-app-bot-id
        run: echo "user-id=$(gh api "/users/${{ steps.release-app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.release-app-token.outputs.token }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git author for release commit
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
        env:
          APP_SLUG: ${{ steps.release-app-token.outputs.app-slug }}
          USER_ID: ${{ steps.release-app-bot-id.outputs.user-id }}

      # - name: Release
      #   run: pnpm exec semantic-release
      #   env:
      #     GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
      #     GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
